<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cafe Recursionのフードページです。">
  <!--Reset/Project styles-->
  <link rel="stylesheet" href="styles/destyle.css">
  <link rel="stylesheet" href="styles/style.css">
  <!--Bootstrap-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!--Google Fonts-->
  <link href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&family=Hina+Mincho&display=swap" rel="stylesheet">
  <title>Food | Cafe Recursion</title>
  <style>
    .nothing-you-could-do {
      font-family: "Nothing You Could Do", cursive;
    }
    .hina-mincho-regular {
      font-family: "Hina Mincho", serif;
      font-weight: 400;
      font-style: normal;
    }
  </style>
</head>

<body>
  <!--ナビゲーション-->
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <a class="navbar-brand nothing-you-could-do" href="index.html">Cafe Recursion</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse nothing-you-could-do" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="drink.html">Drink</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="sweets.html">Sweets</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="food.html">Food</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="information.html">Information</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!--Food Menu-->
  <div class="container py-5">
    <h1 class="nothing-you-could-do fs-1 mb-5 text-syart">Food Menu</h1>
    <div class="row justify-content-center">

      <!--Pasta-->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Shrimp and Tomato Cream Pasta.png" alt="Shrimp and Tomato Cream Pasta" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">海老のトマトクリームパスタ</p>
      </div>
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Pesto Pasta with Fresh Tomato and Basil.png" alt="Pesto Pasta with Fresh Tomato and Basil" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">フレッシュトマトとバジルのジェノベーゼパスタ</p>
      </div>

      <!--Sand/Toast-->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Club Sandwich.png" alt="Club Sandwich" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">クラブサンドウィッチ</p>
      </div>
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Avocado Toast.png" alt="Avocado Toast" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">アボカドトースト</p>
      </div>

      <!--Pancakes-->
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Fresh Berry Pancakes.png" alt="Fresh Berry Pancakes" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">フレッシュベリーパンケーキ</p>
      </div>
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Brunch Pancakes.png" alt="Brunch Pancakes" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">ブランチパンケーキ</p>
      </div>

      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <img src="food_images/Classic Buttermilk Pancakes.png" alt="Classic Buttermilk Pancakes" class="img-fluid rounded shadow-sm">
        <p class="text-center fs-3 hina-mincho-regular mt-3">クラシックバターミルクパンケーキ</p>
      </div>
    </div>
  </div>

  <!--Fotter-->
  <footer class="py-4 text-center text-muted">
    <small>&copy; Cafe Recursion</small>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
