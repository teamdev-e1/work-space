<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cafe Recursionのフードページです。">
    <!-- Destyle CSS -->
    <link rel="stylesheet" href="styles/destyle.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nothing+You+Could+Do&family=Hina+Mincho&display=swap" rel="stylesheet">
    <title>Food | Cafe Recursion</title>
    <style>
        .hina-mincho-regular {
            font-family: "Hina Mincho", serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div id="food-page" class="vh-100 d-flex justify-content-start align-items-center flex-column">
        <!-- ナビゲーション -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light col-12">
            <div class="container-fluid">
                <a class="navbar-brand nothing-you-could-do" href="index.html">Cafe Recursion</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse nothing-you-could-do" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="drink.html">Drink</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Sweets</a></li>
                        <li class="nav-item"><a class="nav-link active" href="food.html">Food</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Information</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- フードメニュー -->
        <div class="container py-5">
            <h3 class="nothing-you-could-do fs-1 mb-4">Food Menu</h3>
            <div class="row">
                <!--Pasta-->
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Shrimp and Tomato Cream Pasta.png" alt="Shrimp and Tomato Cream Pasta" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">海老のトマトクリームパスタ</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Pesto Pasta with Fresh Tomato and Basil.png" alt="Pesto Pasta with Fresh Tomato and Basil" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">フレッシュトマトとバジルのジェノベーゼパスタ</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Club Sandwich.png" alt="Club Sandwich" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">クラブサンドウィッチ</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Avocado Toast.png" alt="Avocado Toast" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">アボカドトースト</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Fresh Berry Pancakes.png" alt="Fresh Berry Pancakes" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">フレッシュベリーパンケーキ</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Brunch Pancakes.png" alt="Brunch Pancakes" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">ブランチパンケーキ</p>
                </div>
                <div class="col-12 col-md-6 col-lg-4 mb-4">
                    <img src="food_images/Classic Buttermilk Pancakes.png" alt="Classic Buttermilk Pancakes" class="img-fluid">
                    <p class="text-center fs-3 hina-mincho-regular mt-2">クラシックバターミルクパンケーキ</p>
                </div>
            </div>
        </div>
    </div>

</html>
